<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>typstmd — Markdown to PDF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      padding: 8px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #toolbar h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .toolbar-btn {
      padding: 6px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .toolbar-secondary {
      padding: 4px 10px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #444;
    }
    .toolbar-secondary:hover { background: #eee; }
    #view-toggle.active {
      background: #e0e7ff;
      border-color: #93b4fd;
      color: #2563eb;
    }
    #theme-select {
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      color: #444;
      background: white;
    }
    .toolbar-spacer { flex: 1; }
    #download-link {
      font-size: 14px;
      color: #2563eb;
      display: none;
    }
    #editor.source-view {
      background: #fafaf5;
      color: #555;
    }
    #editor.template-view {
      background: #fdf6e3;
      color: #333;
    }
    #template-toggle.active {
      background: #fef9c3;
      border-color: #fbbf24;
      color: #92400e;
    }
    #reset-template {
      display: none;
      padding: 4px 10px;
      background: none;
      border: 1px solid #f87171;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #dc2626;
    }
    #reset-template:hover { background: #fef2f2; }
    #reset-template.visible { display: inline; }
    #main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    #editor {
      flex: 1;
      border: none;
      border-right: 1px solid #ddd;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      resize: none;
      outline: none;
    }
    #preview-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #preview {
      flex: 1;
      border: none;
      background: #f9f9f9;
    }
    #status {
      padding: 4px 16px;
      font-size: 12px;
      color: #666;
      background: #fafafa;
      border-top: 1px solid #eee;
    }
    #status.error {
      color: #dc2626;
      background: #fef2f2;
    }
    #status.loading {
      color: #2563eb;
    }

    /* Unsaved badge */
    .badge-unsaved {
      display: none;
      align-items: center;
      border-radius: 6px;
      background-color: #fefce8;
      padding: 4px 8px;
      font-size: 0.75rem;
      line-height: 1rem;
      font-weight: 500;
      color: #854d0e;
      box-shadow: inset 0 0 0 1px rgb(202 138 4 / 0.2);
    }
    .badge-unsaved.visible {
      display: inline-flex;
    }
    @media (prefers-color-scheme: dark) {
      .badge-unsaved {
        background-color: rgb(250 204 21 / 0.1);
        color: #eab308;
        box-shadow: inset 0 0 0 1px rgb(250 204 21 / 0.2);
      }
    }

    /* Drop overlay */
    #drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(37, 99, 235, 0.08);
      border: 3px dashed #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #2563eb;
      font-weight: 600;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #drop-overlay.visible {
      opacity: 1;
    }

    /* Mobile layout */
    @media (max-width: 768px) {
      #main {
        flex-direction: column;
      }
      #editor {
        border-right: none;
        border-bottom: 1px solid #ddd;
        min-height: 40vh;
        flex: none;
      }
      #preview-container {
        min-height: 40vh;
      }
      #toolbar {
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 12px;
      }
      #toolbar h1 {
        font-size: 14px;
      }
      .toolbar-spacer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>typstmd</h1>
    <span id="unsaved-badge" class="badge-unsaved">Unsaved</span>
    <button id="convert-btn" class="toolbar-btn" disabled>Convert</button>
    <select id="theme-select" title="PDF theme">
      <option value="default">Default</option>
      <option value="minimal">Minimal</option>
      <option value="academic">Academic</option>
    </select>
    <label style="font-size:13px;color:#444;display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="hard-breaks-toggle">
      Hard breaks
    </label>
    <div class="toolbar-spacer"></div>
    <button id="template-toggle" class="toolbar-secondary" title="Edit Typst template for current theme">Template</button>
    <button id="reset-template" title="Reset template to built-in theme default">Reset</button>
    <button id="view-toggle" class="toolbar-secondary" title="Toggle Typst source view">Source</button>
    <a id="download-link" href="#" download="output.pdf">Download PDF</a>
  </div>
  <div id="main">
    <textarea id="editor" spellcheck="false">Loading...</textarea>
    <div id="preview-container">
      <iframe id="preview"></iframe>
    </div>
  </div>
  <div id="status" class="loading">Initializing WASM compiler...</div>
  <div id="drop-overlay">Drop .md file to load</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
